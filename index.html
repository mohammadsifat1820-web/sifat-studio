<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIFAT STUDIO - FF Tournament</title>
    <style>
        :root {
            --primary: #ff8c00;
            --secondary: #ff4500;
            --bg: #0a0a0a;
            --card: #161616;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: white;
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        /* Ad Popup Style */
        #adModal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .ad-content {
            background: var(--card);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            border: 2px solid var(--primary);
            max-width: 300px;
        }
        .ad-content img { width: 100%; border-radius: 10px; margin-bottom: 10px; }
        .close-btn {
            background: var(--primary);
            border: none; color: white; padding: 10px 20px;
            cursor: pointer; border-radius: 5px; font-weight: bold;
        }

        /* Form Style */
        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(255, 140, 0, 0.2);
            border: 1px solid #333;
        }

        .header { text-align: center; margin-bottom: 30px; }
        .header img { width: 120px; border-radius: 50%; border: 3px solid var(--primary); }
        .header h1 { color: var(--primary); margin: 10px 0; font-size: 24px; text-transform: uppercase; }

        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #ccc; font-size: 14px; }
        input {
            width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333;
            background: #222; color: white; box-sizing: border-box;
        }
        input:focus { border-color: var(--primary); outline: none; }

        .player-box {
            border: 1px solid #333; padding: 15px; border-radius: 10px;
            margin-bottom: 20px; background: rgba(255,255,255,0.02);
        }
        .player-box h3 { margin-top: 0; font-size: 16px; color: var(--primary); border-bottom: 1px solid #333; padding-bottom: 5px; }

        .submit-btn {
            width: 100%; padding: 15px; background: linear-gradient(to right, var(--primary), var(--secondary));
            border: none; color: white; font-weight: bold; font-size: 18px;
            border-radius: 10px; cursor: pointer; transition: 0.3s;
        }
        .submit-btn:hover { transform: scale(1.02); opacity: 0.9; }

    </style>
</head>
<body>

<div id="adModal">
    <div class="ad-content">
        <img src="https://via.placeholder.com/300x150?text=Your+Ad+Here" alt="Advertisement">
        <p style="color: #fff;">SIFAT STUDIO মেগা টুর্নামেন্ট! 🔥<br>
    রেজিস্ট্রেশন করলেই থাকছে আকর্ষণীয় পুরস্কার। <br>
    এখনি নিচের CLOSE বাটনে ক্লিক করে ফর্মটি পূরণ করো!।</p>
        <button class="close-btn" onclick="closeAd()">CLOSE</button>
    </div>
</div>

<div class="container">
    <div class="header">
        <img src="https://ibb.co.com/F4LXtZKq" alt="SIFAT STUDIO">
        <h1>SIFAT STUDIO</h1>
        <p style="color: #777;">Free Fire Tournament Registration</p>
    </div>

    <form id="regForm">
        <div class="input-group">
            <label>Team Name :</label>
            <input type="text" id="teamName" required>
        </div>

        <div class="input-group">
            <label>Team Logo (Upload from Gallery) :</label>
            <input type="file" id="teamLogo" accept="image/*">
        </div>

        <div class="input-group">
            <label>Team Leader WhatsApp Number :</label>
            <input type="number" id="leaderWA" placeholder="e.g. 01793075655" required>
        </div>

        <hr style="border: 0.5px solid #333; margin: 30px 0;">

        <div id="playersContainer">
            <div class="player-box">
                <h3>Player - 1 (Leader)</h3>
                <label>Player Name:</label>
                <input type="text" id="p1Name" required style="margin-bottom: 10px;">
                <label>UID:</label>
                <input type="text" id="p1UID" required>
            </div>

            <div class="player-box">
                <h3>Player - 2</h3>
                <label>Player Name:</label>
                <input type="text" id="p2Name" required style="margin-bottom: 10px;">
                <label>UID:</label>
                <input type="text" id="p2UID" required>
            </div>

            <div class="player-box">
                <h3>Player - 3</h3>
                <label>Player Name:</label>
                <input type="text" id="p3Name" required style="margin-bottom: 10px;">
                <label>UID:</label>
                <input type="text" id="p3UID" required>
            </div>

            <div class="player-box">
                <h3>Player - 4</h3>
                <label>Player Name:</label>
                <input type="text" id="p4Name" required style="margin-bottom: 10px;">
                <label>UID:</label>
                <input type="text" id="p4UID" required>
            </div>

            <div class="player-box">
                <h3>Player - 5</h3>
                <label>Player Name:</label>
                <input type="text" id="p5Name" style="margin-bottom: 10px;">
                <label>UID:</label>
                <input type="text" id="p5UID">
            </div>
        </div>

        <button type="button" class="submit-btn" onclick="sendToWhatsApp()">SUBMIT REGISTRATION</button>
    </form>
</div>

<script>
    function closeAd() {
        document.getElementById('adModal').style.display = 'none';
    }

    function sendToWhatsApp() {
        const teamName = document.getElementById('teamName').value;
        const leaderWA = document.getElementById('leaderWA').value;
        const phone = "8801793075655";

        const p1Name = document.getElementById('p1Name').value;
        const p1UID = document.getElementById('p1UID').value;
        
        const p2Name = document.getElementById('p2Name').value;
        const p2UID = document.getElementById('p2UID').value;

        const p3Name = document.getElementById('p3Name').value;
        const p3UID = document.getElementById('p3UID').value;

        const p4Name = document.getElementById('p4Name').value;
        const p4UID = document.getElementById('p4UID').value;

        const p5Name = document.getElementById('p5Name').value || "N/A";
        const p5UID = document.getElementById('p5UID').value || "N/A";

        if(!teamName || !leaderWA || !p1Name || !p1UID) {
            alert("Please fill the required fields!");
            return;
        }

        const message = `*SIFAT STUDIO - REGISTRATION*%0A` +
                        `--------------------------%0A` +
                        `*Team Name:* ${teamName}%0A` +
                        `*Leader WA:* ${leaderWA}%0A` +
                        `--------------------------%0A` +
                        `*Player 1 (L):* ${p1Name} (UID: ${p1UID})%0A` +
                        `*Player 2:* ${p2Name} (UID: ${p2UID})%0A` +
                        `*Player 3:* ${p3Name} (UID: ${p3UID})%0A` +
                        `*Player 4:* ${p4Name} (UID: ${p4UID})%0A` +
                        `*Player 5:* ${p5Name} (UID: ${p5UID})%0A%0A` +
                        `_Note: Please send your team logo now._`;

        const whatsappURL = `https://wa.me/${phone}?text=${message}`;
        window.open(whatsappURL, '_blank');
    }
</script>

</body>
</html>

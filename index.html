<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIFAT STUDIO | FF Tournament</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #ff4b2b;
            --secondary-color: #ff416c;
            --bg-color: #050505;
            --card-bg: #1a1a1a;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle, #24243e 0%, #0f0c29 100%);
            color: white;
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(255, 75, 43, 0.3);
            width: 100%;
            max-width: 450px;
            border: 2px solid var(--primary-color);
        }

        /* Logo Design */
        .logo-area {
            text-align: center;
            margin-bottom: 20px;
        }
        .logo-icon {
            font-size: 50px;
            color: var(--primary-color);
            text-shadow: 0 0 15px var(--primary-color);
        }
        .logo-text {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 2px;
            background: linear-gradient(to right, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 5px 0;
        }

        h3 { text-align: center; font-size: 16px; color: #aaa; text-transform: uppercase; margin-bottom: 25px; }

        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; font-size: 14px; font-weight: 600; color: var(--primary-color); }
        
        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #252525;
            color: white;
            box-sizing: border-box;
            transition: 0.3s;
        }
        input:focus { border-color: var(--secondary-color); outline: none; background: #333; }

        .player-card {
            background: rgba(255, 255, 255, 0.03);
            border-left: 4px solid var(--primary-color);
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 5px;
        }

        .btn-submit {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            border: none;
            color: white;
            font-weight: bold;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 65, 108, 0.4);
            transition: 0.3s;
            margin-top: 10px;
        }
        .btn-submit:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(255, 65, 108, 0.6); }

        footer { text-align: center; margin-top: 20px; font-size: 12px; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-area">
        <div class="logo-icon"><i class="fas fa-gamepad"></i></div>
        <div class="logo-text">SIFAT STUDIO</div>
    </div>
    <h3>Registration Form</h3>
    
    <form id="regForm">
        <div class="input-group">
            <label><i class="fas fa-users"></i> Team Name</label>
            <input type="text" id="teamName" placeholder="Enter Team Name" required>
        </div>
        
        <div class="input-group">
            <label><i class="fab fa-whatsapp"></i> Leader WhatsApp No</label>
            <input type="number" id="leaderWA" placeholder="017XXXXXXXX" required>
        </div>

        <div id="players-container">
            <div class="player-card">
                <label>Leader (Player 1)</label>
                <input type="text" id="p1Name" placeholder="Name" required style="margin-bottom: 8px;">
                <input type="text" id="p1UID" placeholder="UID" required>
            </div>
            <div class="player-card">
                <label>Player 2</label>
                <input type="text" id="p2Name" placeholder="Name" required style="margin-bottom: 8px;">
                <input type="text" id="p2UID" placeholder="UID" required>
            </div>
            <div class="player-card">
                <label>Player 3</label>
                <input type="text" id="p3Name" placeholder="Name" required style="margin-bottom: 8px;">
                <input type="text" id="p3UID" placeholder="UID" required>
            </div>
            <div class="player-card">
                <label>Player 4</label>
                <input type="text" id="p4Name" placeholder="Name" required style="margin-bottom: 8px;">
                <input type="text" id="p4UID" placeholder="UID" required>
            </div>
            <div class="player-card" style="border-left-color: #555;">
                <label>Player 5 (Substitute)</label>
                <input type="text" id="p5Name" placeholder="Name" style="margin-bottom: 8px;">
                <input type="text" id="p5UID" placeholder="UID">
            </div>
        </div>

        <button type="button" class="btn-submit" onclick="sendWhatsApp()">
            <i class="fab fa-whatsapp"></i> SUBMIT TO WHATSAPP
        </button>
    </form>
    
    <footer>Developed by SIFAT STUDIO</footer>
</div>

<script>
    function sendWhatsApp() {
        const phone = "8801793075655";
        const tName = document.getElementById('teamName').value;
        const lWA = document.getElementById('leaderWA').value;

        const p1 = document.getElementById('p1Name').value + " (UID: " + document.getElementById('p1UID').value + ")";
        const p2 = document.getElementById('p2Name').value + " (UID: " + document.getElementById('p2UID').value + ")";
        const p3 = document.getElementById('p3Name').value + " (UID: " + document.getElementById('p3UID').value + ")";
        const p4 = document.getElementById('p4Name').value + " (UID: " + document.getElementById('p4UID').value + ")";
        const p5 = document.getElementById('p5Name').value + " (UID: " + document.getElementById('p5UID').value + ")";

        if(!tName || !lWA || !document.getElementById('p1Name').value) {
            alert("Please fill all required fields!");
            return;
        }

        const msg = `*--- SIFAT STUDIO REGISTRATION ---*%0A%0A` +
                    `*Team Name:* ${tName}%0A` +
                    `*Leader WA:* ${lWA}%0A%0A` +
                    `*Players:*%0A1. ${p1}%0A2. ${p2}%0A3. ${p3}%0A4. ${p4}%0A5. ${p5}`;

        window.open(`https://wa.me/${phone}?text=${msg}`, '_blank');
    }
</script>

</body>
</html>
